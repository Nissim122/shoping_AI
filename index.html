<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0e1628">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="רשימת קניות">
  <title>רשימת קניות</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0e1628; --bg-e: #141d35; --bg-f: #1a2540;
      --blue: #2196b0; --blue-l: #2db3cd;
      --blue-g: rgba(33,150,176,0.28); --blue-bg: rgba(33,150,176,0.08);
      --pink: #e0176b; --pink-g: rgba(224,23,107,0.28); --pink-bg: rgba(224,23,107,0.08);
      --text: #ffffff; --muted: rgba(255,255,255,0.5); --subtle: rgba(255,255,255,0.28);
      --border: rgba(255,255,255,0.09); --border-strong: rgba(255,255,255,0.18);
      --border-blue: rgba(33,150,176,0.28); --border-pink: rgba(224,23,107,0.28);
      --green: #28c76f; --error: #ef4444;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    button { touch-action: manipulation; }

    body {
      font-family: 'Heebo', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      direction: rtl;
      overscroll-behavior-y: contain;
    }

    .bg-grad {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 70% 50% at 10% 10%, rgba(33,150,176,0.07) 0%, transparent 65%),
        radial-gradient(ellipse 50% 45% at 90% 85%, rgba(224,23,107,0.05) 0%, transparent 65%),
        var(--bg);
    }

    .grain {
      position: fixed; inset: 0; z-index: 1; pointer-events: none; opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 256px 256px;
    }

    .app {
      position: relative;
      z-index: 2;
      max-width: 640px;
      margin: 0 auto;
      padding: 2rem 1rem max(5rem, calc(3rem + env(safe-area-inset-bottom)));
    }

    /* ── Header ── */
    .app-header {
      text-align: center;
      margin-bottom: 1.75rem;
    }
    .app-header h1 {
      font-size: clamp(1.6rem, 5vw, 2rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 0.25rem;
    }
    .app-header p { color: var(--muted); font-size: 0.88rem; }

    /* ── Search wrap ── */
    .search-wrap {
      position: relative;
      margin-bottom: 1.5rem;
    }

    .search-row {
      display: flex;
      gap: 0.5rem;
    }

    .add-input {
      flex: 1;
      background: var(--bg-e);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      font-family: 'Heebo', sans-serif;
      font-size: 16px;
      color: var(--text);
      outline: none;
      direction: rtl;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .add-input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(33,150,176,0.18);
    }
    .add-input::placeholder { color: var(--subtle); }

    /* ── Suggestions dropdown ── */
    .suggestions {
      position: absolute;
      top: calc(100% + 6px);
      right: 0; left: 0;
      background: var(--bg-f);
      border: 1.5px solid var(--border-strong);
      border-radius: 14px;
      overflow: hidden;
      z-index: 200;
      max-height: 300px;
      overflow-y: auto;
      box-shadow: 0 8px 32px rgba(0,0,0,0.45);
      animation: suggFadeIn 0.15s ease-out;
    }
    .suggestions.hidden { display: none; }

    @keyframes suggFadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .sugg-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 14px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background 0.12s;
    }
    .sugg-item:last-child { border-bottom: none; }
    .sugg-item:hover,
    .sugg-item.highlighted { background: var(--blue-bg); }

    .sugg-icon { font-size: 1.1rem; line-height: 1; flex-shrink: 0; }
    .sugg-info { flex: 1; min-width: 0; }
    .sugg-name {
      font-size: 0.93rem;
      font-weight: 600;
    }
    .sugg-name mark {
      background: none;
      color: var(--blue-l);
      font-weight: 800;
    }
    .sugg-cat {
      font-size: 0.73rem;
      color: var(--muted);
      margin-top: 1px;
    }

    .sugg-custom {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 14px;
      cursor: pointer;
      border-top: 1px solid var(--border);
      transition: background 0.12s;
      color: var(--muted);
      font-size: 0.88rem;
    }
    .sugg-custom:hover, .sugg-custom.highlighted { background: var(--pink-bg); color: var(--text); }

    /* ── List topbar ── */
    .list-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.9rem;
      flex-wrap: wrap;
      gap: 0.6rem;
    }
    .list-summary { font-size: 0.85rem; color: var(--muted); }
    .list-actions { display: flex; gap: 0.4rem; flex-wrap: wrap; }

    .progress-bar {
      background: var(--bg-e);
      border-radius: 999px;
      height: 4px;
      margin-bottom: 1.5rem;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--blue), var(--green));
      border-radius: 999px;
      transition: width 0.4s ease;
    }

    /* ── Item ── */
    .item {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      background: var(--bg-e);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
      margin-bottom: 0.38rem;
      transition: border-color 0.2s, opacity 0.25s;
      animation: fadeUp 0.2s ease-out;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .item.checked { opacity: 0.4; border-color: transparent; }

    .item-check {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: 2.5px solid var(--border-strong);
      background: transparent;
      cursor: pointer;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, border-color 0.2s;
    }
    .item-check:hover { border-color: var(--green); }
    .item.checked .item-check { background: var(--green); border-color: var(--green); }
    .item.checked .item-check::after { content: '✓'; color: #fff; font-size: 16px; font-weight: 800; }

    .item-icon { font-size: 1.1rem; flex-shrink: 0; }

    .item-name {
      flex: 1;
      font-size: 0.95rem;
      font-weight: 600;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .item.checked .item-name { text-decoration: line-through; color: var(--muted); }

    /* ── Qty Controls ── */
    .qty-controls {
      display: flex;
      align-items: center;
      gap: 2px;
      flex-shrink: 0;
      background: var(--bg-f);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }
    .qty-btn {
      background: none;
      border: none;
      color: var(--blue-l);
      font-size: 1.15rem;
      font-weight: 700;
      width: 36px; height: 36px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, color 0.15s;
      font-family: 'Inter', sans-serif;
    }
    .qty-btn:hover { background: var(--blue-bg); color: var(--blue); }
    .qty-btn.minus:hover { background: var(--pink-bg); color: var(--pink); }
    .qty-num {
      min-width: 28px;
      text-align: center;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--text);
      user-select: none;
    }

    .item-del {
      background: none;
      border: none;
      color: var(--subtle);
      cursor: pointer;
      font-size: 0.9rem;
      padding: 10px 8px;
      border-radius: 8px;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      min-width: 36px; min-height: 36px;
      transition: color 0.2s, background 0.2s;
    }
    .item-del:hover { color: var(--error); background: rgba(239,68,68,0.1); }

    /* ── Tabs ── */
    .tab-bar {
      display: flex;
      background: var(--bg-e);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 4px;
      margin-bottom: 1.5rem;
      gap: 4px;
    }
    .tab-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: transparent;
      border: none;
      color: var(--muted);
      font-family: 'Heebo', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 10px 12px;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.18s, color 0.18s;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active {
      background: var(--blue);
      color: #fff;
      box-shadow: 0 2px 8px rgba(33,150,176,0.25);
    }
    .tab-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--pink);
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      border-radius: 999px;
      min-width: 20px;
      height: 18px;
      padding: 0 6px;
      line-height: 1;
    }
    .tab-badge.hidden { display: none; }
    .tab-panel.hidden { display: none; }

    /* ── Buttons ── */
    .btn-sm {
      font-family: 'Heebo', sans-serif;
      font-size: 13px; font-weight: 600;
      padding: 9px 15px;
      border-radius: 8px; min-height: 36px;
      border: 1.5px solid var(--border);
      background: transparent; color: var(--muted);
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
    }
    .btn-sm:hover { color: #fff; border-color: var(--border-strong); }
    .btn-sm.danger { color: var(--error); border-color: rgba(239,68,68,0.22); }
    .btn-sm.danger:hover { border-color: var(--error); background: rgba(239,68,68,0.07); }
    .btn-s {
      background: transparent; color: var(--muted);
      font-family: 'Heebo', sans-serif; font-weight: 500; font-size: 14px;
      padding: 11px 20px; border-radius: 12px;
      border: 1.5px solid var(--border); cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-s:hover { border-color: var(--border-strong); color: #fff; }

    /* ── Empty State ── */
    .empty-state {
      text-align: center;
      padding: 3.5rem 1rem;
      color: var(--muted);
    }
    .empty-icon { font-size: 3rem; opacity: 0.35; margin-bottom: 0.75rem; }
    .empty-title { font-size: 1.05rem; font-weight: 700; margin-bottom: 0.3rem; }
    .empty-sub { font-size: 0.85rem; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: max(2rem, calc(1rem + env(safe-area-inset-bottom)));
      left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: var(--bg-f);
      border: 1.5px solid var(--border-strong);
      border-radius: 12px;
      padding: 11px 22px;
      font-size: 0.88rem; font-weight: 600; color: var(--text);
      z-index: 500;
      opacity: 0;
      transition: opacity 0.22s ease, transform 0.22s ease;
      pointer-events: none;
      max-width: calc(100vw - 2rem);
      text-align: center;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.success { border-color: rgba(40,199,111,0.35); color: var(--green); }
    .toast.error   { border-color: rgba(239,68,68,0.35); color: var(--error); }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(5px);
      z-index: 300;
      display: flex; align-items: center; justify-content: center;
      padding: 1rem;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s;
    }
    .modal-overlay.show { opacity: 1; pointer-events: all; }
    .modal-box {
      background: var(--bg-e);
      border: 1.5px solid var(--border-strong);
      border-radius: 18px; padding: 1.75rem;
      max-width: 360px; width: 100%;
      transform: scale(0.94) translateY(12px);
      transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
    }
    .modal-overlay.show .modal-box { transform: scale(1) translateY(0); }
    .modal-box h3 { font-size: 1.05rem; font-weight: 800; margin-bottom: 0.5rem; }
    .modal-box p  { font-size: 0.875rem; color: var(--muted); line-height: 1.6; margin-bottom: 1.25rem; }
    .modal-actions { display: flex; gap: 0.5rem; justify-content: flex-end; }

    @media (max-width: 480px) {
      .app { padding: 1.25rem 0.75rem max(5rem, calc(3rem + env(safe-area-inset-bottom))); }
      .list-topbar { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <div class="bg-grad"></div>
  <div class="grain"></div>
  <div class="toast" id="toast"></div>

  <div class="app">

    <div class="app-header">
      <h1>🛒 רשימת קניות</h1>
      <p>חפש מוצר והוסף לסל</p>

    <!-- Tabs -->

      <button class="tab-btn" id="tab-add" onclick="switchTab('add')">הוסף מוצר ＋</button>

        רשימת קניות
        <span class="tab-badge hidden" id="tab-badge"></span>
      </button>
    </div>

    <!-- Add panel -->
    <div class="tab-panel hidden" id="panel-add">
      <div class="search-wrap" id="search-wrap">
        <div class="search-row">
          <input
            class="add-input"
            id="add-input"
            type="text"
            placeholder="חפש מוצר..."
            autocomplete="off"
            inputmode="search"
          >
        </div>
        <div class="suggestions hidden" id="suggestions"></div>
      </div>
    </div>

    <!-- List panel -->
    <div class="tab-panel" id="panel-list">
      <div id="list-container"></div>
    </div>

  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modal">
    <div class="modal-box">
      <h3 id="modal-title"></h3>
      <p id="modal-body"></p>
      <div class="modal-actions">
        <button class="btn-s" onclick="closeModal()">ביטול</button>
        <button class="btn-sm danger" id="modal-ok" style="font-size:14px;padding:10px 20px;">אישור</button>
      </div>
    </div>
  </div>

      { name: 'קרם הגנה',           category: 'טיפוח ובריאות' },
      { name: 'דאודורנט',           category: 'טיפוח ובריאות' },
      { name: 'משחת שיניים',        category: 'טיפוח ובריאות' },
      { name: 'מברשת שיניים',       category: 'טיפוח ובריאות' },

      { name: 'ביסלי גריל',         category: 'אחר' },
      { name: 'במבה',               category: 'אחר' },
      { name: 'תפוצ\'יפס',          category: 'אחר' },
      { name: 'פרינגלס',            category: 'אחר' },
      { name: 'עוגיות',             category: 'אחר' },
      { name: 'גומי',               category: 'אחר' },
    ];

    const CAT_ICONS = {
      'ירקות ופירות':     '🥬',
      'מוצרי חלב וביצים': '🥛',
      'לחם ומאפים':       '🍞',
      'בשר עוף ודגים':    '🥩',
      'שימורים ויבשים':   '🥫',
      'קפואים':           '🧊',
      'משקאות':           '🥤',
      'ניקיון ותכשירים':  '🧹',
      'טיפוח ובריאות':    '🧴',
      'אחר':              '📦',
    };

    const CATS_ORDER = [
      'ירקות ופירות', 'מוצרי חלב וביצים', 'לחם ומאפים',
      'בשר עוף ודגים', 'שימורים ויבשים', 'קפואים',
      'משקאות', 'ניקיון ותכשירים', 'טיפוח ובריאות', 'אחר'
    ];

    // ── State ────────────────────────────────────────────────────────────────
    const STORAGE_KEY = 'shopping_list_v2';
    let list          = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    let modalCb       = null;
    let highlightIdx  = -1;
    let activeTab     = 'list';

    renderList();

    // ── Tabs ─────────────────────────────────────────────────────────────────
    function switchTab(tab) {
      activeTab = tab;
      document.getElementById('panel-add').classList.toggle('hidden', tab !== 'add');
      document.getElementById('panel-list').classList.toggle('hidden', tab !== 'list');
      document.getElementById('tab-add').classList.toggle('active', tab === 'add');
      document.getElementById('tab-list').classList.toggle('active', tab === 'list');
      if (tab === 'add') {
        setTimeout(() => document.getElementById('add-input').focus(), 50);
      }
    }

    // ── Search / Suggestions ─────────────────────────────────────────────────
    const input = document.getElementById('add-input');

    input.addEventListener('input', onSearch);
    input.addEventListener('keydown', onKey);

    document.addEventListener('click', e => {
      if (!e.target.closest('#search-wrap')) hideSuggestions();
    });

    function onSearch() {
      const q = input.value.trim();
      highlightIdx = -1;
      if (!q) { hideSuggestions(); return; }
      showSuggestions(q);
    }

    function showSuggestions(q) {
      const matches = searchProducts(q);
      const el      = document.getElementById('suggestions');

      let html = '';

      for (const p of matches) {
        const icon = CAT_ICONS[p.category] || '📦';
        html += `
          <div class="sugg-item" data-name="${esc(p.name)}" data-cat="${esc(p.category)}" onclick="selectProduct('${esc(p.name)}','${esc(p.category)}')">
            <span class="sugg-icon">${icon}</span>
            <div class="sugg-info">
              <div class="sugg-name">${highlightMatch(p.name, q)}</div>
              <div class="sugg-cat">${esc(p.category)}</div>
            </div>
          </div>`;
      }

      // Option to add custom product if not in DB
      const exactMatch = PRODUCTS.some(p => p.name === q);
      if (!exactMatch) {
        html += `
          <div class="sugg-custom" onclick="selectProduct('${esc(q)}','אחר')">
            <span>＋</span>
            <span>הוסף "<strong>${esc(q)}</strong>"</span>
          </div>`;
      }

      el.innerHTML = html;
      el.classList.remove('hidden');
    }

    function hideSuggestions() {
      document.getElementById('suggestions').classList.add('hidden');
      highlightIdx = -1;
    }

    function searchProducts(q) {
      const lower = q;
      const starts   = PRODUCTS.filter(p => p.name.startsWith(lower));
      const contains = PRODUCTS.filter(p => !p.name.startsWith(lower) && p.name.includes(lower));
      return [...starts, ...contains].slice(0, 8);
    }

    function highlightMatch(name, q) {
      const idx = name.indexOf(q);
      if (idx === -1) return esc(name);
      return esc(name.slice(0, idx)) +
             '<mark>' + esc(name.slice(idx, idx + q.length)) + '</mark>' +
             esc(name.slice(idx + q.length));
    }

    // ── Keyboard navigation ──────────────────────────────────────────────────
    function onKey(e) {
      const sugg  = document.getElementById('suggestions');
      const items = [...sugg.querySelectorAll('.sugg-item, .sugg-custom')];
      const count = items.length;

      if (e.key === 'ArrowDown') {
        e.preventDefault();
        highlightIdx = Math.min(highlightIdx + 1, count - 1);
        updateHighlight(items);
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        highlightIdx = Math.max(highlightIdx - 1, -1);
        updateHighlight(items);
      } else if (e.key === 'Enter') {
        e.preventDefault();
        if (highlightIdx >= 0 && items[highlightIdx]) {
          items[highlightIdx].click();
        } else if (count > 0) {
          items[0].click();
        } else {
          const q = input.value.trim();
          if (q) selectProduct(q, 'אחר');
        }
      } else if (e.key === 'Escape') {
        hideSuggestions();
        input.blur();
      }
    }

    function updateHighlight(items) {
      items.forEach((el, i) => el.classList.toggle('highlighted', i === highlightIdx));
      if (highlightIdx >= 0) items[highlightIdx].scrollIntoView({ block: 'nearest' });
    }

    // ── Add to list ──────────────────────────────────────────────────────────
    function selectProduct(name, category) {
      const norm     = name.trim().toLowerCase();
      const existing = list.find(p => !p.checked && p.name.toLowerCase() === norm);

      if (existing) {
        existing.quantity += 1;
        saveList();
        renderList();
        showToast(`${existing.name} ×${existing.quantity}`, 'success');
      } else {
        list.unshift({
          id:       Date.now() + Math.random(),
          name:     name.trim(),
          quantity: 1,
          category: category || 'אחר',
          checked:  false,
        });
        saveList();
        renderList();
        showToast(`${name} נוסף`, 'success');
      }

      input.value = '';
      hideSuggestions();
      switchTab('list');
    }

    // ── Qty controls ─────────────────────────────────────────────────────────
    function incQty(id) {
      const item = list.find(p => p.id === id);
      if (!item) return;
      item.quantity++;
      saveList(); renderList();
    }

    function decQty(id) {
      const item = list.find(p => p.id === id);
      if (!item) return;
      if (item.quantity > 1) { item.quantity--; saveList(); renderList(); }
      else removeItem(id);
    }

    // ── List item actions ─────────────────────────────────────────────────────
    function toggleItem(id) {
      const item = list.find(p => p.id === id);
      if (!item) return;
      item.checked = !item.checked;
      saveList(); renderList();
    }

    function removeItem(id) {
      list = list.filter(p => p.id !== id);
      saveList(); renderList();
    }

    function saveList() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
    }

    // ── Render list ───────────────────────────────────────────────────────────
    function renderList() {
      const el    = document.getElementById('list-container');
      const badge = document.getElementById('tab-badge');
      badge.textContent = list.length;
      badge.classList.toggle('hidden', list.length === 0);

      if (!list.length) {
        el.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">🛒</div>
            <div class="empty-title">הסל ריק</div>
            <div class="empty-sub">לחץ על "הוסף מוצר" כדי להתחיל</div>
          </div>`;
        return;
      }

      const total   = list.length;
      const checked = list.filter(p => p.checked).length;
      const pct     = Math.round((checked / total) * 100);

      // Group by category
      const groups = {};
      for (const item of list) {
        const cat = item.category || 'אחר';
        if (!groups[cat]) groups[cat] = [];
        groups[cat].push(item);
      }

      const ordered = CATS_ORDER.filter(c => groups[c]);
      const extra   = Object.keys(groups).filter(c => !CATS_ORDER.includes(c));
      const allCats = [...ordered, ...extra];

      let html = `
        <div class="list-topbar">
          <div class="list-summary">${total} פריטים · ${checked} נרכשו (${pct}%)</div>
          <div class="list-actions">
            ${checked > 0 ? `<button class="btn-sm" onclick="confirmAction('checked')">מחק מסומנים (${checked})</button>` : ''}
            <button class="btn-sm danger" onclick="confirmAction('all')">נקה הכל</button>
          </div>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" style="width:${pct}%"></div>
        </div>`;

      for (const cat of allCats) {
        const items = groups[cat];
        const icon  = CAT_ICONS[cat] || '📦';
        html += `<div style="margin-bottom:1.25rem">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;padding:0 2px">
            <span style="font-size:0.85rem">${icon}</span>
            <span style="font-size:0.72rem;font-weight:700;color:var(--blue-l);letter-spacing:0.05em;text-transform:uppercase">${esc(cat)}</span>
          </div>`;

        const sorted = [...items].sort((a, b) => Number(a.checked) - Number(b.checked));
        for (const item of sorted) {
          html += `
            <div class="item ${item.checked ? 'checked' : ''}" data-id="${item.id}">
              <button class="item-check" onclick="toggleItem(${item.id})" aria-label="סמן כנרכש"></button>
              <span class="item-name">${esc(item.name)}</span>
              <div class="qty-controls">
                <button class="qty-btn minus" onclick="decQty(${item.id})" aria-label="הפחת">−</button>
                <span class="qty-num">${item.quantity}</span>
                <button class="qty-btn plus" onclick="incQty(${item.id})" aria-label="הוסף">+</button>
              </div>
              <button class="item-del" onclick="removeItem(${item.id})" aria-label="מחק">✕</button>
            </div>`;
        }
        html += `</div>`;
      }

      el.innerHTML = html;
    }

    function esc(s) {
      return String(s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;')
        .replace(/'/g,'&#39;');
    }

    // ── Confirm + Clear ───────────────────────────────────────────────────────
    function confirmAction(type) {
      if (type === 'all') {
        openModal('ניקוי הסל', 'האם למחוק את כל הרשימה?', () => {
          list = []; saveList(); renderList();
          showToast('הסל נוקה', 'success');
        });
      } else {
        const n = list.filter(p => p.checked).length;
        openModal('מחיקת פריטים מסומנים', `האם למחוק ${n} פריטים שנרכשו?`, () => {
          list = list.filter(p => !p.checked);
          saveList(); renderList();
          showToast(`${n} פריטים נמחקו`, 'success');
        });
      }
    }

    // ── Modal ─────────────────────────────────────────────────────────────────
    function openModal(title, body, cb) {
      document.getElementById('modal-title').textContent = title;
      document.getElementById('modal-body').textContent  = body;
      modalCb = cb;
      document.getElementById('modal').classList.add('show');
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('show');
      modalCb = null;
    }

    document.getElementById('modal-ok').addEventListener('click', () => {
      if (modalCb) { modalCb(); closeModal(); }
    });
    document.getElementById('modal').addEventListener('click', e => {
      if (e.target.id === 'modal') closeModal();
    });

    // ── Toast ─────────────────────────────────────────────────────────────────
    let _toastTimer;
    function showToast(msg, type = '') {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className   = 'toast show' + (type ? ' ' + type : '');
      clearTimeout(_toastTimer);
      _toastTimer = setTimeout(() => { el.className = 'toast'; }, 2500);
    }
  </script>
